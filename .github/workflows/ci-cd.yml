name: CI-CD

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

env:
  REGISTRY: ghcr.io

jobs:
  image-meta:
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.meta.outputs.owner }}
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - name: Prepare image metadata
        id: meta
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "backend_image=ghcr.io/$owner/educhallenge-backend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=ghcr.io/$owner/educhallenge-frontend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        run: |
          chmod +x mvnw
          ./mvnw test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker-images:
    if: github.event_name == 'push'
    needs:
      - image-meta
      - backend-test
      - frontend-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ needs.image-meta.outputs.backend_image }}
            ghcr.io/${{ needs.image-meta.outputs.owner }}/educhallenge-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          build-args: |
            VITE_API_BASE_URL=/api
          push: true
          tags: |
            ${{ needs.image-meta.outputs.frontend_image }}
            ghcr.io/${{ needs.image-meta.outputs.owner }}/educhallenge-frontend:latest

  deploy:
    if: github.event_name == 'push'
    needs:
      - image-meta
      - docker-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"

      - name: Create or update secrets
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl -n educhallenge create secret generic educhallenge-secrets \
            --from-literal=POSTGRES_DB=${{ secrets.POSTGRES_DB }} \
            --from-literal=POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/backend-configmap.yaml
          kubectl apply -f k8s/postgres-pvc.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Update application images
        run: |
          kubectl -n educhallenge set image deployment/backend backend=${{ needs.image-meta.outputs.backend_image }}
          kubectl -n educhallenge set image deployment/frontend frontend=${{ needs.image-meta.outputs.frontend_image }}

      - name: Wait for rollout
        run: |
          kubectl -n educhallenge rollout status deployment/postgres --timeout=180s
          kubectl -n educhallenge rollout status deployment/backend --timeout=180s
          kubectl -n educhallenge rollout status deployment/frontend --timeout=180s
