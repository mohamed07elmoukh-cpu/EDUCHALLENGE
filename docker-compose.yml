services:
  postgres:
    image: postgres:16
    container_name: educhallenge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: educhallenge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d educhallenge"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
